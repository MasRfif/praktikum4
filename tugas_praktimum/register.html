<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daftar - SmartSociety</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../tugas_praktimum/asset/css/style.css" />
  </head>
  <body
    class="font-body bg-dark-bg text-dark-text min-h-screen flex items-center justify-center p-4">
    <div
      class="w-full max-w-md bg-card-bg-dark p-8 rounded-xl shadow-2xl border border-primary/20">
      <h2 class="font-title text-3xl text-center mb-6 text-primary">
        Buat Akun Baru
      </h2>
      <p class="text-center text-gray-400 mb-8">
        Daftar sebagai pengguna biasa untuk melihat semua acara.
      </p>

      <form action="../tugas_praktimum/register.php" method="POST">
        <div class="mb-4">
          <label for="reg-username" class="block text-sm font-medium mb-1"
            >Username</label
          >
          <input
            type="text"
            name="username"
            id="reg-username"
            class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600 text-dark-text focus:ring-primary focus:border-primary"
            required />
        </div>

        <div class="mb-4">
          <label for="reg-email" class="block text-sm font-medium mb-1"
            >Email</label
          >
          <input
            type="email"
            name="email"
            id="reg-email"
            class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600 text-dark-text focus:ring-primary focus:border-primary"
            required />
        </div>

        <div class="mb-4">
          <label for="reg-password" class="block text-sm font-medium mb-1"
            >Password</label
          >
          <input
            type="password"
            name="password"
            id="reg-password"
            class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600 text-dark-text focus:ring-primary focus:border-primary"
            required />
        </div>

        <div class="mb-6">
          <label for="re-enter-password" class="block text-sm font-medium mb-1"
            >Konfirmasi Password</label
          >
          <input
            type="password"
            id="re-enter-password"
            class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600 text-dark-text focus:ring-primary focus:border-primary"
            required />
        </div>

        <button
          type="submit"
          class="w-full bg-primary hover:bg-amber-700 text-white font-semibold py-3 rounded-lg transition duration-300">
          Register Akun Pengguna
        </button>
      </form>

      <p class="mt-8 text-center text-sm text-gray-400">
        Sudah punya akun?
        <a href="login.html" class="text-primary font-semibold hover:underline"
          >Masuk</a
        >
        <br />
        Atau ingin daftar sebagai
        <a href="../Web/pilih_role.html" class="text-blue-400 hover:underline"
          >Penyelenggara</a
        >?
      </p>
    </div>
  </body>
</html>
