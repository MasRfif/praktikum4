<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Masuk - SmartSociety</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../tugas_praktimum/asset/css/style.css" />
  </head>
  <body
    class="font-body bg-dark-bg text-dark-text min-h-screen flex items-center justify-center p-4">
    <div
      class="w-full max-w-sm sm:max-w-md bg-card-bg-dark p-6 sm:p-8 rounded-xl shadow-2xl border border-primary/20">
      <h2 class="font-title text-3xl text-center mb-6 text-primary">
        Selamat Datang
      </h2>

      <p class="text-center text-xs text-gray-500 mb-6">
        DUMMY Testing : admin@desa.com | penyelenggara@desa.com | user@desa.com
      </p>

      <form action="../tugas_praktimum/login.php" method="POST">
        <div class="mb-4">
          <label for="email" class="block text-sm font-medium mb-1"
            >Email</label
          >
          <input
            type="email"
            name="email"
            id="email"
            value="user@desa.com"
            class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600 text-dark-text focus:ring-primary focus:border-primary"
            required />
        </div>
        <div class="mb-6">
          <label for="password" class="block text-sm font-medium mb-1"
            >Password</label
          >
          <input
            type="password"
            name="password"
            id="password"
            value="12345"
            class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600 text-dark-text focus:ring-primary focus:border-primary"
            required />
        </div>

        <button
          type="submit"
          class="w-full bg-primary hover:bg-amber-700 text-white font-semibold py-3 rounded-lg transition duration-300">
          Masuk
        </button>
      </form>

      <div class="flex items-center mt-4">
        <input
          type="checkbox"
          id="remember"
          class="mr-2"
          onclick="rememberMe()" />
        <label for="remember" class="text-sm text-gray-400">Ingat Saya</label>
      </div>

      <p class="mt-8 text-center text-sm text-gray-400">
        Lupa Password?
        <a href="reset_Password.html" class="text-primary hover:underline"
          >Reset</a
        >
      </p>

      <p class="mt-2 text-center text-sm text-gray-400">
        Belum punya akun?
        <a href="register.html" class="text-primary hover:underline">Daftar</a>
      </p>
    </div>
  </body>
</html>
